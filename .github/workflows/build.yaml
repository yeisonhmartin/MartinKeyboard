name: Build ZMK Firmware

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:3.0
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure Git credentials
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:
          git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Initialize ZMK project from manifest
        run: |
          west init -m https://github.com/zmkfirmware/zmk-config.git
          west update

      - name: Build firmware
        run: |
          west build -s zmk/app -d build/customkbd -- -DSHIELD=customkbd -DZMK_CONFIG=$(pwd)/config


