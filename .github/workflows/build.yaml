name: Build ZMK Firmware

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:3.0
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Initialize and fetch ZMK
        run: |
          west init -m https://github.com/zmkfirmware/zmk.git zmk
          west update

      - name: Build firmware
        run: |
          west build -s zmk/app -d build/customkbd -- -DSHIELD=customkbd -DZMK_CONFIG=$(pwd)/config

